<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Detalle proceso</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="container-fluid py-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>
                    <h1 class="fw-bold"
                        th:text="${proceso.nombre}">
                    </h1>

                    <p class="text-muted">
                        Gestión de exámenes procesados
                    </p>
                </div>

                <a href="/"
                   class="btn btn-secondary">
                    Volver
                </a>
            </div>
            <div class="card shadow-sm border-0 mb-4">

                <div class="card-body d-flex gap-3 flex-wrap">

                    <input type="text"
                           class="form-control"
                           placeholder="Buscar por código"
                           id="buscadorCodigo"
                           style="max-width: 300px;">

                    <select class="form-select"
                            id="ordenPuntaje"
                            style="max-width: 250px;">

                        <option value="desc">
                            Mayor a menor
                        </option>

                        <option value="asc">
                            Menor a mayor
                        </option>
                    </select>

                    <select class="form-select shadow-sm"
                            id="filtroCarrera"
                            style="max-width: 350px;">

                        <option value="">
                            Todas las carreras
                        </option>

                        <option th:each="carrera : ${carreras}"
                                th:value="${carrera.nombre}"
                                th:text="${carrera.nombre}">
                        </option>

                    </select>
                </div>
            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle"
                       id="tablaExamenes">

                    <thead class="table-dark">
                    <tr>
                        <th>Carrera</th>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Correctas</th>
                        <th>Incorrectas</th>
                        <th>Blancas</th>
                        <th>Puntaje</th>
                        <th>Ingresó</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="examen : ${examenes}"
                        th:classappend="${examen.anulado} ? 'table-danger' : ''">

                        <td th:text="${examen.alumno.carrera.nombre}"></td>

                        <td th:text="${examen.alumno.codigo}"></td>

                        <td th:text="${examen.alumno.nombres}"></td>

                        <td th:text="${examen.correctas}"></td>

                        <td th:text="${examen.incorrectas}"></td>

                        <td th:text="${examen.blancas}"></td>

                        <td class="puntaje"
                            th:text="${examen.puntaje}">
                        </td>

                        <td>
                            No definido
                        </td>

                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <span th:if="${examen.anulado}" class="badge bg-danger d-flex align-items-center gap-1">
                                    ANULADO
                                    <button type="button"
                                            class="btn btn-light btn-sm detalle-anulacion-btn"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="${'#modalDetalleAnulacion' + examen.id}">
                                        ⓘ
                                    </button>
                                </span>

                                <span th:unless="${examen.anulado}" class="badge bg-success">
                                    VÁLIDO
                                </span>
                            </div>
                        </td>

                        <td>

                            <div th:if="${!examen.anulado}">

                                <button class="btn btn-outline-danger btn-sm"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="${'#modalAnular' + examen.id}">
                                    Anular
                                </button>
                            </div>

                            <div th:if="${examen.anulado}">

                                <form method="post"
                                      th:action="@{'/desanular/' + ${examen.id}}">

                                    <button class="btn btn-outline-success btn-sm">
                                        Desanular
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <!-- Botones de Paginacion -->
                <div class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-3 mt-4">
                    <div class="text-muted"
                         id="infoPaginacion">
                        Página 1 de 1
                    </div>

                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-outline-primary" id="btnAnterior">
                            ←
                        </button>
                        <input type="number"
                               class="form-control text-center"
                               id="inputPagina"
                               min="1"
                               value="1"
                               style="width: 90px;">
                        <button class="btn btn-outline-primary" id="btnSiguiente">
                            →
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal para anular un examen-->
        <div th:each="examen : ${examenes}">

            <div class="modal fade"
                 th:id="${'modalAnular' + examen.id}"
                 tabindex="-1">

                <div class="modal-dialog">

                    <div class="modal-content">

                        <form method="post"
                              th:action="@{'/anular/' + ${examen.id}}">

                            <div class="modal-header">

                                <h5 class="modal-title">
                                    Anular examen
                                </h5>

                                <button type="button"
                                        class="btn-close"
                                        data-bs-dismiss="modal">
                                </button>
                            </div>
                            <div class="modal-body">

                                <label class="form-label">
                                    Motivo de anulación
                                </label>

                                <textarea class="form-control"
                                          name="motivo"
                                          required>
                                </textarea>
                            </div>
                            <div class="modal-footer">

                                <button type="button"
                                        class="btn btn-secondary"
                                        data-bs-dismiss="modal">
                                    Cancelar
                                </button>

                                <button class="btn btn-danger">
                                    Confirmar anulación
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal para modificar la anulacion de un examen -->
        <div th:each="examen : ${examenes}">
            <div class="modal fade"
                 th:id="${'modalDetalleAnulacion' + examen.id}" tabindex="-1">

                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-lg">

                        <div class="modal-header bg-danger text-white">
                            <h5 class="modal-title">
                                Detalle de anulación
                            </h5>
                            <button type="button"

                                    class="btn-close btn-close-white"

                                    data-bs-dismiss="modal">
                            </button>
                        </div>

                        <div class="modal-body">
                            <div class="mb-3">
                                <span class="badge bg-danger fs-6">
                                    EXAMEN ANULADO
                                </span>
                            </div>

                            <form method="post" th:action="@{'/actualizar-motivo/' + ${examen.id}}">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">
                                        Motivo de anulación
                                    </label>

                                    <textarea
                                            class="form-control motivo-textarea"
                                            rows="5"
                                            name="motivo"
                                            th:text="${examen.motivoAnulacion}"
                                            readonly>
                                    </textarea>
                                </div>

                                <div class="d-flex gap-2 justify-content-end">
                                    <button type="button" class="btn btn-outline-primary btn-editar-motivo">
                                        Modificar
                                    </button>
                                    <button type="submit" class="btn btn-primary btn-guardar-motivo d-none">
                                        Guardar cambios
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/main.js}"></script>
    </body>
</html>
